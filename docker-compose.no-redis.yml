version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.no-redis
    container_name: velzon_app
    restart: unless-stopped
    working_dir: /app
    ports:
      - "80:80"
    env_file:
      - .env.docker
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - velzon-network
    volumes:
      - ./storage:/app/storage
      - ./public/uploads:/app/public/uploads

  postgres:
    image: postgres:16-alpine
    container_name: velzon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-velzon}
      POSTGRES_USER: ${DB_USERNAME:-velzon}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-velzon}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - velzon-network

  # Optional: Extra Nginx for development with live reload
  #   docker compose -f docker-compose.no-redis.yml --profile dev up
  nginx-dev:
    image: nginx:alpine
    container_name: velzon_nginx_dev
    restart: unless-stopped
    profiles:
      - dev
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/app/public:ro
    depends_on:
      - app
    networks:
      - velzon-network

volumes:
  postgres_data:

networks:
  velzon-network:
    driver: bridge