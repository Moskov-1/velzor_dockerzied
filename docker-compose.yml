version: '3.9'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: velzon_app
    restart: unless-stopped
    working_dir: /app
    ports:
      - "80:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=velzon
      - DB_USERNAME=velzon
      - DB_PASSWORD=secret
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - REDIS_HOST=redis
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - velzon-network
    volumes:
      - ./storage:/app/storage
      - ./public/uploads:/app/public/uploads

  postgres:
    image: postgres:16-alpine
    container_name: velzon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: velzon
      POSTGRES_USER: velzon
      POSTGRES_PASSWORD: secret
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U velzon"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - velzon-network

  redis:
    image: redis:7-alpine
    container_name: velzon_redis
    restart: unless-stopped
    command: redis-server --requirepass "" --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - velzon-network

  # Optional: Nginx for development with live reload
  nginx-dev:
    image: nginx:alpine
    container_name: velzon_nginx_dev
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/app/public:ro
    depends_on:
      - app
    networks:
      - velzon-network
    profiles:
      - dev

volumes:
  postgres_data:
  redis_data:

networks:
  velzon-network:
    driver: bridge
